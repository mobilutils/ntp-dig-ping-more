name: Android Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Copy APK to release/
        run: |
          mkdir -p app/release
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/release/release.apk

      - name: Upload APK as GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: app/release/release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Download
            - `release.apk` — unsigned release build. Install via \`adb install\`.
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: app/release/release.apk
          retention-days: 30