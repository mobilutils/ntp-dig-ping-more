name: Android Release Build (APK + AAB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK & AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Copy signed APK to app/release/
        run: |
          mkdir -p app/release
          cp ${{ steps.sign_apk.outputs.signedReleaseFile }} app/release/release-signed.apk

      - name: Sign AAB
        id: sign_aab
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Copy signed AAB to app/release/
        run: |
          cp ${{ steps.sign_aab.outputs.signedReleaseFile }} app/release/release-signed.aab

      - name: Upload APK as GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: app/release/release-signed.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Download
            - `release-signed.apk` — signed release APK, ready to install
            - `release-signed.aab` — signed release AAB for Google Play Store

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: app/release/
          retention-days: 30
